<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg1:#060b18;
  --bg2:#0c1428;
  --glass:#ffffff08;
  --glass2:#ffffff12;
  --glass3:#ffffff1a;
  --border:#ffffff14;
  --border2:#ffffff22;
  --blue:#4f8ef7;
  --blue2:#6ba3ff;
  --cyan:#38d9c0;
  --red:#ff5f6d;
  --gold:#f7c948;
  --white:#e8edf8;
  --dim:#7a8ab0;
  --muted:#3a4460;
  --radius:18px;
  --radius-btn:12px;
}

html,body{
  min-height:100vh;
  background:var(--bg1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Outfit',sans-serif;
  overflow:hidden;
}

/* Animated bg orbs */
body::before,body::after{
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
  animation:drift 12s ease-in-out infinite alternate;
}
body::before{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(79,142,247,0.18),transparent 70%);
  top:-100px;left:-100px;
}
body::after{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(56,217,192,0.12),transparent 70%);
  bottom:-80px;right:-60px;
  animation-delay:-6s;
}
@keyframes drift{
  0%{transform:translate(0,0)}
  100%{transform:translate(40px,30px)}
}

/* ── WRAPPER ── */
.page{
  position:relative;
  z-index:1;
  width:100%;
  max-width:430px;
  padding:16px;
}

/* ── HEADER ── */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  padding:0 2px;
}
.logo{
  font-family:'Space Mono',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:.3em;
  color:var(--dim);
  text-transform:uppercase;
}
.logo b{color:var(--blue2)}
.angle-btns{
  display:flex;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:30px;
  padding:3px;
  gap:2px;
}
.angle-btn{
  padding:5px 14px;
  border:none;
  border-radius:24px;
  font-family:'Outfit',sans-serif;
  font-size:10px;
  font-weight:600;
  letter-spacing:.1em;
  cursor:pointer;
  background:transparent;
  color:var(--dim);
  transition:all .2s;
}
.angle-btn.on{
  background:var(--blue);
  color:#fff;
  box-shadow:0 0 16px rgba(79,142,247,.4);
}

/* ── CALC SHELL ── */
.shell{
  background:linear-gradient(145deg,#0e1830,#080f20);
  border:1px solid var(--border2);
  border-radius:26px;
  overflow:hidden;
  box-shadow:
    0 40px 100px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04),
    inset 0 1px 0 rgba(255,255,255,.06);
}

/* ── DISPLAY ── */
.display{
  padding:22px 24px 18px;
  background:linear-gradient(180deg,#040a16 0%,#070d1e 100%);
  border-bottom:1px solid var(--border);
  position:relative;
  min-height:148px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.display::before{
  content:'';
  position:absolute;
  top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,142,247,.5),transparent);
}

.d-badges{
  position:absolute;
  top:16px;left:20px;
  display:flex;gap:6px;
}
.badge{
  font-size:9px;
  font-weight:700;
  letter-spacing:.12em;
  padding:3px 8px;
  border-radius:6px;
  opacity:0;
  transition:opacity .25s;
}
.badge.show{opacity:1}
.badge-mem{background:rgba(79,142,247,.18);color:var(--blue2);border:1px solid rgba(79,142,247,.25)}
.badge-rad{background:rgba(56,217,192,.15);color:var(--cyan);border:1px solid rgba(56,217,192,.2)}

.d-hist{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-align:right;
  min-height:14px;
  letter-spacing:.02em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-bottom:3px;
}
.d-expr{
  font-family:'Space Mono',monospace;
  font-size:11.5px;
  color:var(--dim);
  text-align:right;
  min-height:18px;
  word-break:break-all;
  line-height:1.4;
  margin-bottom:6px;
}
.d-main{
  font-family:'Space Mono',monospace;
  font-weight:400;
  font-size:46px;
  color:var(--white);
  text-align:right;
  line-height:1;
  letter-spacing:-.02em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:font-size .1s;
}
.d-main.sz-md{font-size:32px}
.d-main.sz-sm{font-size:22px}

.d-note{
  font-size:10px;
  color:var(--cyan);
  text-align:right;
  margin-top:6px;
  letter-spacing:.12em;
  min-height:14px;
  font-weight:500;
}

/* ── TAB BAR ── */
.tabs{
  display:flex;
  background:#060c1a;
  border-bottom:1px solid var(--border);
}
.tab{
  flex:1;
  padding:11px 4px;
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  font-family:'Outfit',sans-serif;
  font-size:10px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  cursor:pointer;
  transition:all .2s;
}
.tab.on{
  color:var(--blue2);
  border-bottom-color:var(--blue);
  background:rgba(79,142,247,.04);
}

/* ── FN PANELS ── */
.panel{display:none}
.panel.on{display:grid}
.panel{
  grid-template-columns:repeat(5,1fr);
  gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
}

/* ── HISTORY DRAWER ── */
.drawer{
  display:none;
  max-height:110px;
  overflow-y:auto;
  background:#06091a;
  border-bottom:1px solid var(--border);
  padding:8px 12px;
}
.drawer.open{display:block}
.h-row{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid var(--border);
  font-size:10.5px;
  cursor:pointer;
  transition:color .15s;
  gap:12px;
}
.h-row:last-child{border-bottom:none}
.h-row:hover .h-res{color:var(--blue2)}
.h-expr{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.h-res{color:var(--dim);white-space:nowrap;font-family:'Space Mono',monospace;font-size:10px}
.drawer::-webkit-scrollbar{width:3px}
.drawer::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}

/* ── MAIN GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:1px;
  background:var(--border);
}

/* ── BUTTONS ── */
.btn{
  position:relative;
  height:60px;
  border:none;
  cursor:pointer;
  font-family:'Outfit',sans-serif;
  font-size:16px;
  font-weight:500;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  transition:background .12s, transform .08s;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  background:#0b1122;
  color:var(--white);
}
.btn sub{
  font-size:8px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.5;
  font-family:'Outfit',sans-serif;
}
.btn:hover{filter:brightness(1.25)}
.btn:active{transform:scale(.94);filter:brightness(1.4)}

/* num */
.n{background:#0d1526;color:var(--white)}
/* operator */
.o{background:#0c1428;color:var(--blue2)}
/* fn */
.f{background:#0b1220;color:var(--cyan);font-size:12px;font-weight:600}
/* clear */
.cl{background:#120b10;color:var(--red)}
/* equals */
.eq{
  background:linear-gradient(135deg,#3a6ff0,#5b8fff);
  color:#fff;
  font-size:24px;
  font-weight:300;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.eq:hover{filter:brightness(1.15)}
/* span 2 */
.s2{grid-column:span 2}
.tall{grid-row:span 2;height:auto}

/* Ripple */
.btn::after{
  content:'';
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  transform:translate(-50%,-50%) scale(0);
  left:50%;top:50%;
  pointer-events:none;
  transition:transform .35s ease-out,opacity .35s;
  opacity:0;
}
.btn:active::after{
  transform:translate(-50%,-50%) scale(3.5);
  opacity:1;
  transition:transform 0s,opacity 0s;
}

/* ── RESPONSIVE ── */
@media(max-width:440px){
  .page{padding:10px}
  .d-main{font-size:38px}
  .d-main.sz-md{font-size:26px}
  .d-main.sz-sm{font-size:18px}
  .btn{height:54px;font-size:15px}
  .f{font-size:11px}
  .shell{border-radius:22px}
}
@media(max-width:360px){
  .btn{height:48px;font-size:13px}
  .f{font-size:10px}
  .angle-btn{padding:4px 10px}
}

/* Flash */
@keyframes resultFlash{
  0%{color:#fff;text-shadow:0 0 20px rgba(79,142,247,.9)}
  100%{color:var(--white);text-shadow:none}
}
.flash{animation:resultFlash .4s ease-out}

/* Entrance */
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.shell{animation:up .45s cubic-bezier(.16,1,.3,1)}
.header{animation:up .4s cubic-bezier(.16,1,.3,1) .05s both}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="logo"><b>SCI</b>·CALC</div>
    <div class="angle-btns">
      <button class="angle-btn on" id="abDeg" onclick="setMode('deg')">DEG</button>
      <button class="angle-btn" id="abRad" onclick="setMode('rad')">RAD</button>
    </div>
  </div>

  <div class="shell">

    <!-- Display -->
    <div class="display">
      <div class="d-badges">
        <div class="badge badge-mem" id="bMem">MEM</div>
        <div class="badge badge-rad" id="bRad">RAD</div>
      </div>
      <div class="d-hist" id="dHist">&nbsp;</div>
      <div class="d-expr" id="dExpr">&nbsp;</div>
      <div class="d-main" id="dMain">0</div>
      <div class="d-note" id="dNote">&nbsp;</div>
    </div>

    <!-- History Drawer -->
    <div class="drawer" id="drawer"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab on" onclick="tab('trig',this)">Trig</button>
      <button class="tab" onclick="tab('log',this)">Log</button>
      <button class="tab" onclick="tab('pow',this)">Power</button>
      <button class="tab" onclick="tab('cst',this)">Const</button>
      <button class="tab" onclick="tab('mem',this)">Memory</button>
    </div>

    <!-- Panel: Trig -->
    <div class="panel on" id="p-trig">
      <button class="btn f" onclick="fn('sin')">sin<sub>trig</sub></button>
      <button class="btn f" onclick="fn('cos')">cos<sub>trig</sub></button>
      <button class="btn f" onclick="fn('tan')">tan<sub>trig</sub></button>
      <button class="btn f" onclick="fn('asin')">sin⁻¹<sub>inv</sub></button>
      <button class="btn f" onclick="fn('acos')">cos⁻¹<sub>inv</sub></button>
      <button class="btn f" onclick="fn('sinh')">sinh<sub>hyp</sub></button>
      <button class="btn f" onclick="fn('cosh')">cosh<sub>hyp</sub></button>
      <button class="btn f" onclick="fn('tanh')">tanh<sub>hyp</sub></button>
      <button class="btn f" onclick="fn('atan')">tan⁻¹<sub>inv</sub></button>
      <button class="btn f" onclick="fn('sec')">sec<sub>1/cos</sub></button>
    </div>

    <!-- Panel: Log -->
    <div class="panel" id="p-log">
      <button class="btn f" onclick="fn('log10')">log<sub>base10</sub></button>
      <button class="btn f" onclick="fn('log2')">log₂<sub>base2</sub></button>
      <button class="btn f" onclick="fn('ln')">ln<sub>natural</sub></button>
      <button class="btn f" onclick="fn('exp')">eˣ<sub>e^x</sub></button>
      <button class="btn f" onclick="fn('log1p')">ln(1+x)<sub>precise</sub></button>
      <button class="btn f" onclick="fn('abs')">|x|<sub>abs</sub></button>
      <button class="btn f" onclick="fn('ceil')">⌈x⌉<sub>ceil</sub></button>
      <button class="btn f" onclick="fn('floor')">⌊x⌋<sub>floor</sub></button>
      <button class="btn f" onclick="fn('round')">⌊x⌉<sub>round</sub></button>
      <button class="btn f" onclick="fn('sign')">sgn<sub>sign</sub></button>
    </div>

    <!-- Panel: Power -->
    <div class="panel" id="p-pow">
      <button class="btn f" onclick="fn('sqrt')">√x<sub>sqrt</sub></button>
      <button class="btn f" onclick="fn('cbrt')">∛x<sub>cbrt</sub></button>
      <button class="btn f" onclick="op('^2')">x²<sub>square</sub></button>
      <button class="btn f" onclick="op('^3')">x³<sub>cube</sub></button>
      <button class="btn f" onclick="op('^')">xʸ<sub>power</sub></button>
      <button class="btn f" onclick="fn('recip')">1/x<sub>recip</sub></button>
      <button class="btn f" onclick="fn('nroot')">ʸ√x<sub>nth root</sub></button>
      <button class="btn f" onclick="fn('fact')">n!<sub>factorial</sub></button>
      <button class="btn f" onclick="fn('pct')">%<sub>percent</sub></button>
      <button class="btn f" onclick="fn('neg')">±<sub>negate</sub></button>
    </div>

    <!-- Panel: Constants -->
    <div class="panel" id="p-cst">
      <button class="btn f" onclick="con(Math.PI,'π')">π<sub>3.14159</sub></button>
      <button class="btn f" onclick="con(Math.E,'e')">e<sub>2.71828</sub></button>
      <button class="btn f" onclick="con(Math.SQRT2,'√2')">√2<sub>1.41421</sub></button>
      <button class="btn f" onclick="con(Math.LN2,'ln2')">ln2<sub>0.69315</sub></button>
      <button class="btn f" onclick="con(Math.LN10,'ln10')">ln10<sub>2.30259</sub></button>
      <button class="btn f" onclick="con(1.6180339887,'φ')">φ<sub>golden</sub></button>
      <button class="btn f" onclick="con(6.02214076e23,'Nₐ')">Nₐ<sub>avogadro</sub></button>
      <button class="btn f" onclick="con(299792458,'c')">c<sub>m/s</sub></button>
      <button class="btn f" onclick="con(9.80665,'g')">g<sub>m/s²</sub></button>
      <button class="btn f" onclick="con(6.674e-11,'G')">G<sub>grav</sub></button>
    </div>

    <!-- Panel: Memory -->
    <div class="panel" id="p-mem">
      <button class="btn f" onclick="mStore()">MS<sub>store</sub></button>
      <button class="btn f" onclick="mRecall()">MR<sub>recall</sub></button>
      <button class="btn f" onclick="mAdd()">M+<sub>add</sub></button>
      <button class="btn f" onclick="mSub()">M−<sub>sub</sub></button>
      <button class="btn f" onclick="mClear()">MC<sub>clear</sub></button>
      <button class="btn f" onclick="toggleDrawer()">hist<sub>history</sub></button>
      <button class="btn f" onclick="clearHist()">clr H<sub>clear</sub></button>
      <button class="btn f" onclick="doCopy()">copy<sub>clip</sub></button>
      <button class="btn f" onclick="doRand()">rand<sub>random</sub></button>
      <button class="btn f" onclick="useAns()">ANS<sub>last</sub></button>
    </div>

    <!-- Main Keypad -->
    <div class="grid">
      <!-- Row 1 -->
      <button class="btn cl" onclick="ac()">AC<sub>reset</sub></button>
      <button class="btn cl" style="color:#ff9f6d" onclick="ce()">CE<sub>entry</sub></button>
      <button class="btn cl" style="color:#ff9f6d" onclick="bs()">⌫<sub>del</sub></button>
      <button class="btn o" onclick="op('%')">mod<sub>%</sub></button>
      <button class="btn o" onclick="op('/')">÷<sub>div</sub></button>
      <!-- Row 2 -->
      <button class="btn n" onclick="num('7')">7</button>
      <button class="btn n" onclick="num('8')">8</button>
      <button class="btn n" onclick="num('9')">9</button>
      <button class="btn o" onclick="op('*')">×<sub>mul</sub></button>
      <button class="btn o" onclick="op('-')">−<sub>sub</sub></button>
      <!-- Row 3 -->
      <button class="btn n" onclick="num('4')">4</button>
      <button class="btn n" onclick="num('5')">5</button>
      <button class="btn n" onclick="num('6')">6</button>
      <button class="btn o" onclick="op('+')">+<sub>add</sub></button>
      <button class="btn o" onclick="par('(')">(</button>
      <!-- Row 4 + span -->
      <button class="btn n" onclick="num('1')">1</button>
      <button class="btn n" onclick="num('2')">2</button>
      <button class="btn n" onclick="num('3')">3</button>
      <button class="btn o" onclick="par(')')">)</button>
      <button class="btn eq tall" onclick="calc()">=</button>
      <!-- Row 5 -->
      <button class="btn n s2" onclick="num('0')">0</button>
      <button class="btn n" onclick="dot()">.</button>
      <button class="btn o" onclick="op('E')">EXP<sub>×10ⁿ</sub></button>
    </div>

  </div><!-- /shell -->
</div><!-- /page -->

<script>
// ── State ──────────────────────────────────────────────────────────────────
let S={
  disp:'0', expr:'', mode:'deg',
  mem:0, memHas:false,
  ans:null, justCalc:false,
  hist:[]
};

// ── DOM helpers ────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const dMain=$('dMain'), dExpr=$('dExpr'), dHist=$('dHist'), dNote=$('dNote');

function render(){
  dMain.className='d-main';
  const l=S.disp.length;
  if(l>14)dMain.classList.add('sz-sm');
  else if(l>9)dMain.classList.add('sz-md');
  dMain.textContent=S.disp;
  dExpr.textContent=S.expr||'\u00a0';
}

function note(t,ms=2000){
  dNote.textContent=t;
  if(ms)setTimeout(()=>dNote.textContent='\u00a0',ms);
}

function badge(id,show){$('b'+id).classList.toggle('show',show)}

// ── Input ─────────────────────────────────────────────────────────────────
function num(n){
  if(S.justCalc){S.disp=n;S.expr='';S.justCalc=false;}
  else S.disp=S.disp==='0'?n:S.disp+n;
  render();
}
function dot(){
  if(S.justCalc){S.disp='0.';S.justCalc=false;}
  else if(!S.disp.includes('.'))S.disp+='.';
  render();
}
function op(o){
  S.justCalc=false;
  const lbl={'+':'+','-':'−','*':'×','/':'÷','%':'mod','^':'^','E':'×10^'};
  S.expr=(S.expr||'')+S.disp+' '+(lbl[o]||o)+' ';
  S.disp='0';render();
}
function par(p){
  S.justCalc=false;
  if(p==='('){
    S.expr=(S.expr||'')+(S.disp!=='0'?S.disp+'×(':'(');
    S.disp='0';
  }else{
    S.expr=(S.expr||'')+S.disp+')';
    S.disp='0';
  }
  render();
}

// ── Clear / Edit ──────────────────────────────────────────────────────────
function ac(){S.disp='0';S.expr='';S.justCalc=false;render();}
function ce(){S.disp='0';render();}
function bs(){
  if(S.justCalc){ac();return;}
  S.disp=S.disp.length>1?S.disp.slice(0,-1):'0';render();
}

// ── Calculate ─────────────────────────────────────────────────────────────
function calc(){
  let raw=(S.expr+S.disp)
    .replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-')
    .replace(/mod/g,'%').replace(/\^/g,'**')
    .replace(/×10\^/g,'e');
  try{
    const r=Function('"use strict";return('+raw+')')();
    if(!isFinite(r))throw 0;
    const v=parseFloat(r.toPrecision(12));
    pushHist(S.expr+S.disp,v);
    dHist.textContent=(S.expr+S.disp)+' =';
    S.ans=v;S.disp=fmt(v);S.expr='';S.justCalc=true;
    render();flash();
  }catch{
    S.disp='Error';S.expr='';S.justCalc=true;render();
  }
}

function flash(){
  dMain.classList.remove('flash');
  void dMain.offsetWidth;
  dMain.classList.add('flash');
}

// ── Functions ─────────────────────────────────────────────────────────────
function fn(name){
  const v=parseFloat(S.disp);
  const R=a=>S.mode==='deg'?a*Math.PI/180:a;
  const D=a=>S.mode==='deg'?a*180/Math.PI:a;
  const ops={
    sin:v=>Math.sin(R(v)), cos:v=>Math.cos(R(v)), tan:v=>Math.tan(R(v)),
    asin:v=>D(Math.asin(v)), acos:v=>D(Math.acos(v)), atan:v=>D(Math.atan(v)),
    sinh:Math.sinh, cosh:Math.cosh, tanh:Math.tanh,
    sec:v=>1/Math.cos(R(v)),
    log10:Math.log10, log2:Math.log2, ln:Math.log, exp:Math.exp, log1p:Math.log1p,
    abs:Math.abs, ceil:Math.ceil, floor:Math.floor, round:Math.round, sign:Math.sign,
    sqrt:Math.sqrt, cbrt:Math.cbrt,
    recip:v=>1/v,
    nroot:v=>{const n=parseFloat(prompt('Enter n for nth root:')||'2');return Math.pow(v,1/n);},
    fact:v=>{let r=1;for(let i=2;i<=Math.round(v);i++)r*=i;return r;},
    pct:v=>v/100,
    neg:v=>-v,
  };
  const lbls={sin:'sin',cos:'cos',tan:'tan',asin:'arcsin',acos:'arccos',atan:'arctan',
    sinh:'sinh',cosh:'cosh',tanh:'tanh',sec:'sec',log10:'log',log2:'log₂',
    ln:'ln',exp:'eˣ',log1p:'ln(1+x)',abs:'|x|',ceil:'⌈x⌉',floor:'⌊x⌋',
    round:'round',sign:'sgn',sqrt:'√',cbrt:'∛',recip:'1/x',nroot:'ⁿ√',
    fact:'!',pct:'%',neg:'±'};
  try{
    const r=ops[name](v);
    if(!isFinite(r))throw 0;
    const res=parseFloat(r.toPrecision(12));
    pushHist(`${lbls[name]}(${v})`,res);
    dHist.textContent=`${lbls[name]}(${v}) =`;
    S.ans=res;S.disp=fmt(res);S.expr='';S.justCalc=true;
    render();flash();
  }catch{S.disp='Error';S.justCalc=true;render();}
}

function con(val,label){
  S.disp=fmt(val);S.justCalc=false;
  note(label+' = '+val,3000);render();
}

// ── Memory ────────────────────────────────────────────────────────────────
function mStore(){S.mem=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('Stored to M');}
function mRecall(){if(S.memHas){S.disp=fmt(S.mem);render();note('MR = '+fmt(S.mem));}}
function mAdd(){S.mem+=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('M + '+S.disp);}
function mSub(){S.mem-=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('M − '+S.disp);}
function mClear(){S.mem=0;S.memHas=false;badge('Mem',false);note('Memory cleared');}

// ── Angle Mode ────────────────────────────────────────────────────────────
function setMode(m){
  S.mode=m;
  $('abDeg').classList.toggle('on',m==='deg');
  $('abRad').classList.toggle('on',m==='rad');
  badge('Rad',m==='rad');
  note(m.toUpperCase()+' mode');
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function tab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  $('p-'+id).classList.add('on');
}

// ── History ───────────────────────────────────────────────────────────────
function pushHist(expr,res){
  S.hist.unshift({expr,res});
  if(S.hist.length>20)S.hist.pop();
}
function renderDrawer(){
  const d=$('drawer');
  if(!S.hist.length){d.innerHTML='<div style="color:var(--muted);font-size:11px;text-align:center;padding:10px">No history yet</div>';return;}
  d.innerHTML=S.hist.map((h,i)=>
    `<div class="h-row" onclick="pickHist(${i})">
      <span class="h-expr">${h.expr}</span>
      <span class="h-res">${fmt(h.res)}</span>
    </div>`
  ).join('');
}
function toggleDrawer(){
  const d=$('drawer');
  d.classList.toggle('open');
  if(d.classList.contains('open'))renderDrawer();
}
function pickHist(i){S.disp=fmt(S.hist[i].res);S.justCalc=true;render();}
function clearHist(){S.hist=[];dHist.textContent='\u00a0';renderDrawer();note('History cleared');}

// ── Utilities ─────────────────────────────────────────────────────────────
function fmt(n){
  if(Math.abs(n)>=1e15||(Math.abs(n)<1e-10&&n!==0))
    return n.toExponential(6).replace(/\.?0+e/,'e');
  return parseFloat(n.toPrecision(12)).toString();
}
function doCopy(){
  navigator.clipboard.writeText(S.disp).then(()=>note('Copied!'));
}
function doRand(){S.disp=fmt(Math.random());S.justCalc=false;render();}
function useAns(){if(S.ans!==null){S.disp=fmt(S.ans);S.justCalc=false;render();}}

// ── Keyboard ─────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')num(e.key);
  else if(e.key==='.')dot();
  else if(e.key==='+')op('+');
  else if(e.key==='-')op('-');
  else if(e.key==='*')op('*');
  else if(e.key==='/'){e.preventDefault();op('/');}
  else if(e.key==='%')op('%');
  else if(e.key==='^')op('^');
  else if(e.key==='Enter'||e.key==='=')calc();
  else if(e.key==='Backspace')bs();
  else if(e.key==='Escape')ac();
  else if(e.key==='(')par('(');
  else if(e.key===')')par(')');
  else if(e.key==='s')fn('sin');
  else if(e.key==='c')fn('cos');
  else if(e.key==='t')fn('tan');
  else if(e.key==='l')fn('log10');
  else if(e.key==='n')fn('ln');
  else if(e.key==='q')fn('sqrt');
});

render();
</script>
</body>
</html>
