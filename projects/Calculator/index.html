<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0c29;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.6;
  animation: float 10s ease-in-out infinite alternate;
}
.orb1 { width: 55vw; height: 55vw; max-width: 700px; max-height: 700px; background: #7b2ff7; top: -15%; left: -10%; }
.orb2 { width: 45vw; height: 45vw; max-width: 600px; max-height: 600px; background: #0ea5e9; bottom: -12%; right: -8%; animation-delay: -5s; }
.orb3 { width: 30vw; height: 30vw; max-width: 400px; max-height: 400px; background: #f43f5e; top: 35%; left: 55%; animation-delay: -2.5s; }
@keyframes float {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,20px) scale(1.07); }
}

/* ── PAGE LAYOUT ── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── CALC SHELL ── */
.calc {
  width: 100%;
  max-width: 480px;
  border-radius: 32px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.16);
  box-shadow:
    0 32px 80px rgba(0,0,0,0.5),
    0 2px 0 rgba(255,255,255,0.08) inset,
    0 -1px 0 rgba(0,0,0,0.3) inset;
  overflow: hidden;
  animation: appear .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes appear {
  from { opacity:0; transform: translateY(28px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── DISPLAY ── */
.display {
  padding: clamp(18px, 3vw, 30px) clamp(20px, 3.5vw, 32px) clamp(16px, 2.5vw, 26px);
  background: rgba(0,0,0,0.28);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: relative;
}
.display::after {
  content:'';
  position:absolute;
  bottom:0; left:10%; right:10%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(139,92,246,0.4), transparent);
}

.display-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: clamp(14px, 2.5vw, 22px);
}

.brand {
  font-size: clamp(9px,1vw,11px);
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}

.angle-group {
  display: flex;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
}
.angle-btn {
  padding: clamp(3px,0.5vw,5px) clamp(10px,1.5vw,14px);
  border-radius: 16px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: clamp(9px,1vw,11px);
  font-weight: 600;
  letter-spacing: .08em;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.32);
  transition: all .2s;
}
.angle-btn.on {
  background: rgba(255,255,255,0.15);
  color: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}

.display-numbers { text-align: right; }

.d-history {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(10px,1.1vw,12px);
  color: rgba(255,255,255,0.2);
  min-height: 16px;
  margin-bottom: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.d-expr {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(11px,1.3vw,14px);
  color: rgba(255,255,255,0.38);
  min-height: 20px;
  margin-bottom: clamp(6px,1vw,10px);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.d-main {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  font-size: clamp(36px,6vw,58px);
  color: #fff;
  line-height: 1;
  letter-spacing: -.03em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: font-size .1s;
}
.d-main.md { font-size: clamp(26px,4.5vw,40px); }
.d-main.sm { font-size: clamp(18px,3vw,26px); }

.d-note {
  font-size: clamp(9px,1vw,11px);
  font-weight: 500;
  letter-spacing: .14em;
  color: rgba(167,139,250,0.9);
  text-align: right;
  min-height: 16px;
  margin-top: clamp(5px,1vw,9px);
}

.badges {
  position: absolute;
  bottom: clamp(14px,2vw,22px);
  left: clamp(16px,2.5vw,28px);
  display: flex;
  gap: 6px;
}
.badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .12em;
  padding: 3px 7px;
  border-radius: 5px;
  opacity: 0;
  transition: opacity .25s;
}
.badge.show { opacity: 1; }
.bm { background: rgba(139,92,246,.22); color: #a78bfa; border: 1px solid rgba(139,92,246,.28); }
.br { background: rgba(14,165,233,.18); color: #38bdf8; border: 1px solid rgba(14,165,233,.22); }

/* ── TABS ── */
.tabs {
  display: flex;
  padding: clamp(10px,1.5vw,14px) clamp(12px,2vw,18px) 0;
  gap: 2px;
  background: rgba(0,0,0,0.16);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.tab {
  flex: 1;
  padding: clamp(7px,1vw,10px) 2px;
  border: none;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: clamp(9px,1vw,11px);
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .2s;
  border-radius: 6px 6px 0 0;
}
.tab.on {
  color: rgba(255,255,255,.88);
  border-bottom-color: rgba(139,92,246,.85);
  background: rgba(255,255,255,.04);
}

/* ── FN PANELS ── */
.panel {
  display: none;
  grid-template-columns: repeat(5, 1fr);
  gap: clamp(5px,0.8vw,8px);
  padding: clamp(10px,1.5vw,14px) clamp(12px,2vw,18px);
  background: rgba(0,0,0,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.panel.on { display: grid; }

/* ── HISTORY DRAWER ── */
.drawer {
  display: none;
  padding: 10px clamp(12px,2vw,18px);
  max-height: 110px;
  overflow-y: auto;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.drawer.open { display: block; }
.h-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: all .15s;
}
.h-row:last-child { border-bottom: none; }
.h-row:hover .h-val { color: #a78bfa; }
.h-ex  { font-size:10px; color:rgba(255,255,255,0.22); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.h-val { font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(255,255,255,0.55); white-space:nowrap; }
.drawer::-webkit-scrollbar { width:3px; }
.drawer::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

/* ── KEYPAD ── */
.keypad {
  padding: clamp(12px,2vw,18px);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, clamp(54px,7.5vh,70px));
  gap: clamp(6px,1vw,10px);
}
.keypad .eq {
  grid-column: 5;
  grid-row: 4 / 6;
  height: auto;
  min-height: 0;
  font-size: clamp(28px,4vw,42px);
}

/* ── BUTTONS ── */
.btn {
  position: relative;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: clamp(10px,1.5vw,14px);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: clamp(14px,1.8vw,18px);
  font-weight: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  transition: transform .08s, filter .08s;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.btn sub {
  font-size: clamp(7px,0.9vw,9px);
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  opacity: .45;
  font-family: 'Inter', sans-serif;
}
.btn:hover  { filter: brightness(1.22); }
.btn:active { transform: scale(.93); filter: brightness(1.4); }

/* fn buttons in panels */
.f {
  height: clamp(44px,6vh,56px);
  border-radius: clamp(8px,1.2vw,11px);
  font-size: clamp(11px,1.3vw,14px);
  font-weight: 600;
  background: rgba(14,165,233,0.13);
  border: 1px solid rgba(14,165,233,0.22);
  color: #7dd3fc;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}

/* number */
.n {
  background: rgba(255,255,255,0.11);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  box-shadow: 0 2px 10px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.1) inset;
}

/* operator */
.o {
  background: rgba(139,92,246,0.25);
  border: 1px solid rgba(139,92,246,0.4);
  color: #ddd6fe;
  box-shadow: 0 2px 10px rgba(139,92,246,.2);
}

/* clear red */
.cl {
  background: rgba(244,63,94,0.18);
  border: 1px solid rgba(244,63,94,0.26);
  color: #fda4af;
  box-shadow: 0 2px 8px rgba(244,63,94,.1);
}
/* mild clear */
.cl2 {
  background: rgba(244,63,94,0.09);
  border: 1px solid rgba(244,63,94,0.15);
  color: #fca5a5;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}

/* equals */
.eq {
  background: linear-gradient(160deg, #7c3aed, #6d28d9);
  border: 1px solid rgba(139,92,246,0.6);
  color: #fff;
  font-size: clamp(20px,3vw,28px);
  font-weight: 300;
  box-shadow: 0 6px 24px rgba(109,40,217,.5), 0 1px 0 rgba(255,255,255,.18) inset;
}

.s2 { grid-column: span 2; }

/* flash */
@keyframes numFlash {
  0%   { color: #a78bfa; }
  100% { color: #fff; }
}
.flash { animation: numFlash .35s ease-out; }

/* ── LARGE SCREEN BOOST ── */
@media (min-width: 900px) {
  .calc { max-width: 520px; }
  .d-main { font-size: 64px; }
  .d-main.md { font-size: 44px; }
  .d-main.sm { font-size: 30px; }
}

/* ── SMALL SCREENS ── */
@media (max-width: 480px) {
  .page { padding: 12px; }
  .calc { border-radius: 24px; }
}
@media (max-width: 360px) {
  .keypad { grid-template-rows: repeat(5, 46px); }
  .f { height: 36px; font-size: 9px; }
}

/* short screens (landscape phone) */
@media (max-height: 600px) {
  .keypad { grid-template-rows: repeat(5, clamp(38px,7vh,50px)); }
  .f    { height: clamp(32px,5.5vh,42px); }
  .display { padding: 14px 20px 12px; }
  .d-main  { font-size: clamp(28px,5vw,44px); }
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="page">
<div class="calc">

  <!-- Display -->
  <div class="display">
    <div class="display-top">
      <div class="brand">Sci · Calc</div>
      <div class="angle-group">
        <button class="angle-btn on" id="abDeg" onclick="setMode('deg')">DEG</button>
        <button class="angle-btn"    id="abRad" onclick="setMode('rad')">RAD</button>
      </div>
    </div>
    <div class="display-numbers">
      <div class="d-history" id="dHist">&nbsp;</div>
      <div class="d-expr"    id="dExpr">&nbsp;</div>
      <div class="d-main"    id="dMain">0</div>
      <div class="d-note"    id="dNote">&nbsp;</div>
    </div>
    <div class="badges">
      <span class="badge bm" id="bMem">MEM</span>
      <span class="badge br" id="bRad">RAD</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" onclick="switchTab('trig',this)">Trig</button>
    <button class="tab"    onclick="switchTab('log',this)">Log</button>
    <button class="tab"    onclick="switchTab('pow',this)">Power</button>
    <button class="tab"    onclick="switchTab('cst',this)">Const</button>
    <button class="tab"    onclick="switchTab('mem',this)">Mem</button>
  </div>

  <!-- Panels -->
  <div class="panel on" id="p-trig">
    <button class="btn f" onclick="fn('sin')">sin<sub>trig</sub></button>
    <button class="btn f" onclick="fn('cos')">cos<sub>trig</sub></button>
    <button class="btn f" onclick="fn('tan')">tan<sub>trig</sub></button>
    <button class="btn f" onclick="fn('asin')">sin⁻¹<sub>inv</sub></button>
    <button class="btn f" onclick="fn('acos')">cos⁻¹<sub>inv</sub></button>
    <button class="btn f" onclick="fn('sinh')">sinh<sub>hyp</sub></button>
    <button class="btn f" onclick="fn('cosh')">cosh<sub>hyp</sub></button>
    <button class="btn f" onclick="fn('tanh')">tanh<sub>hyp</sub></button>
    <button class="btn f" onclick="fn('atan')">tan⁻¹<sub>inv</sub></button>
    <button class="btn f" onclick="fn('sec')">sec<sub>1/cos</sub></button>
  </div>
  <div class="panel" id="p-log">
    <button class="btn f" onclick="fn('log10')">log<sub>base10</sub></button>
    <button class="btn f" onclick="fn('log2')">log₂<sub>base2</sub></button>
    <button class="btn f" onclick="fn('ln')">ln<sub>nat</sub></button>
    <button class="btn f" onclick="fn('exp')">eˣ<sub>e^x</sub></button>
    <button class="btn f" onclick="fn('log1p')">ln(1+x)</button>
    <button class="btn f" onclick="fn('abs')">|x|<sub>abs</sub></button>
    <button class="btn f" onclick="fn('ceil')">⌈x⌉<sub>ceil</sub></button>
    <button class="btn f" onclick="fn('floor')">⌊x⌋<sub>floor</sub></button>
    <button class="btn f" onclick="fn('round')">round</button>
    <button class="btn f" onclick="fn('sign')">sgn<sub>sign</sub></button>
  </div>
  <div class="panel" id="p-pow">
    <button class="btn f" onclick="fn('sqrt')">√x</button>
    <button class="btn f" onclick="fn('cbrt')">∛x</button>
    <button class="btn f" onclick="op('^2')">x²</button>
    <button class="btn f" onclick="op('^3')">x³</button>
    <button class="btn f" onclick="op('^')">xʸ</button>
    <button class="btn f" onclick="fn('recip')">1/x</button>
    <button class="btn f" onclick="fn('nroot')">ʸ√x</button>
    <button class="btn f" onclick="fn('fact')">n!</button>
    <button class="btn f" onclick="fn('pct')">%</button>
    <button class="btn f" onclick="fn('neg')">±</button>
  </div>
  <div class="panel" id="p-cst">
    <button class="btn f" onclick="con(Math.PI,'π')">π<sub>3.14…</sub></button>
    <button class="btn f" onclick="con(Math.E,'e')">e<sub>2.71…</sub></button>
    <button class="btn f" onclick="con(Math.SQRT2,'√2')">√2</button>
    <button class="btn f" onclick="con(Math.LN2,'ln2')">ln2</button>
    <button class="btn f" onclick="con(Math.LN10,'ln10')">ln10</button>
    <button class="btn f" onclick="con(1.6180339887,'φ')">φ<sub>gold</sub></button>
    <button class="btn f" onclick="con(6.02214076e23,'Nₐ')">Nₐ</button>
    <button class="btn f" onclick="con(299792458,'c')">c<sub>m/s</sub></button>
    <button class="btn f" onclick="con(9.80665,'g')">g<sub>m/s²</sub></button>
    <button class="btn f" onclick="con(6.674e-11,'G')">G</button>
  </div>
  <div class="panel" id="p-mem">
    <button class="btn f" onclick="mStore()">MS<sub>store</sub></button>
    <button class="btn f" onclick="mRecall()">MR<sub>recall</sub></button>
    <button class="btn f" onclick="mAdd()">M+</button>
    <button class="btn f" onclick="mSub()">M−</button>
    <button class="btn f" onclick="mClear()">MC</button>
    <button class="btn f" onclick="toggleDrawer()">hist</button>
    <button class="btn f" onclick="clearHist()">clr H</button>
    <button class="btn f" onclick="doCopy()">copy</button>
    <button class="btn f" onclick="doRand()">rand</button>
    <button class="btn f" onclick="useAns()">ANS</button>
  </div>

  <!-- History -->
  <div class="drawer" id="drawer"></div>

  <!-- Keypad -->
  <div class="keypad">
    <!-- Col 1-4 row 1 -->
    <button class="btn cl"  onclick="ac()">AC</button>
    <button class="btn cl2" onclick="ce()">CE</button>
    <button class="btn cl2" onclick="bs()">⌫</button>
    <button class="btn o"   onclick="op('%')">mod</button>
    <!-- Col 5 row 1 -->
    <button class="btn o"   onclick="op('/')">÷</button>

    <!-- Col 1-4 row 2 -->
    <button class="btn n" onclick="num('7')">7</button>
    <button class="btn n" onclick="num('8')">8</button>
    <button class="btn n" onclick="num('9')">9</button>
    <button class="btn o" onclick="op('*')">×</button>
    <!-- Col 5 row 2 -->
    <button class="btn o" onclick="op('-')">−</button>

    <!-- Col 1-4 row 3 -->
    <button class="btn n" onclick="num('4')">4</button>
    <button class="btn n" onclick="num('5')">5</button>
    <button class="btn n" onclick="num('6')">6</button>
    <button class="btn o" onclick="op('+')">+</button>
    <!-- Col 5 row 3 -->
    <button class="btn o" onclick="par('(')">(</button>

    <!-- Col 1-4 row 4 -->
    <button class="btn n" onclick="num('1')">1</button>
    <button class="btn n" onclick="num('2')">2</button>
    <button class="btn n" onclick="num('3')">3</button>
    <button class="btn o" onclick="par(')')">)</button>
    <!-- EQUALS spans col5 rows 4-5 -->
    <button class="btn eq" onclick="calc()">=</button>

    <!-- Col 1-4 row 5 -->
    <button class="btn n s2" onclick="num('0')">0</button>
    <button class="btn n"    onclick="dot()">.</button>
    <button class="btn o"    onclick="op('E')">EXP</button>
  </div>

</div><!-- /calc -->
</div><!-- /page -->

<script>
const $=id=>document.getElementById(id);
let S={disp:'0',expr:'',mode:'deg',mem:0,memHas:false,ans:null,justCalc:false,hist:[]};

function render(){
  const el=$('dMain');
  el.className='d-main';
  if(S.disp.length>14)el.classList.add('sm');
  else if(S.disp.length>9)el.classList.add('md');
  el.textContent=S.disp;
  $('dExpr').textContent=S.expr||'\u00a0';
}
function note(t,ms=2200){$('dNote').textContent=t;if(ms)setTimeout(()=>$('dNote').textContent='\u00a0',ms);}
function badge(id,v){$('b'+id).classList.toggle('show',v);}
function flash(){const e=$('dMain');e.classList.remove('flash');void e.offsetWidth;e.classList.add('flash');}

function num(n){if(S.justCalc){S.disp=n;S.expr='';S.justCalc=false;}else S.disp=S.disp==='0'?n:S.disp+n;render();}
function dot(){if(S.justCalc){S.disp='0.';S.justCalc=false;}else if(!S.disp.includes('.'))S.disp+='.';render();}
function op(o){S.justCalc=false;const l={'+':'+','-':'−','*':'×','/':'÷','%':'mod','^':'^','E':'×10^'};S.expr=(S.expr||'')+S.disp+' '+(l[o]||o)+' ';S.disp='0';render();}
function par(p){S.justCalc=false;if(p==='('){S.expr=(S.expr||'')+(S.disp!=='0'?S.disp+'×(':' (');S.disp='0';}else{S.expr=(S.expr||'')+S.disp+')';S.disp='0';}render();}
function ac(){S.disp='0';S.expr='';S.justCalc=false;render();}
function ce(){S.disp='0';render();}
function bs(){if(S.justCalc){ac();return;}S.disp=S.disp.length>1?S.disp.slice(0,-1):'0';render();}

function calc(){
  let raw=(S.expr+S.disp).replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-').replace(/mod/g,'%').replace(/\^/g,'**').replace(/×10\^/g,'e');
  try{
    const r=Function('"use strict";return('+raw+')')();
    if(!isFinite(r))throw 0;
    const v=parseFloat(r.toPrecision(12));
    addHist(S.expr+S.disp,v);
    $('dHist').textContent=(S.expr+S.disp)+' =';
    S.ans=v;S.disp=fmt(v);S.expr='';S.justCalc=true;render();flash();
  }catch{S.disp='Error';S.expr='';S.justCalc=true;render();}
}

function fn(name){
  const v=parseFloat(S.disp);
  const R=a=>S.mode==='deg'?a*Math.PI/180:a;
  const D=a=>S.mode==='deg'?a*180/Math.PI:a;
  const ops={sin:v=>Math.sin(R(v)),cos:v=>Math.cos(R(v)),tan:v=>Math.tan(R(v)),asin:v=>D(Math.asin(v)),acos:v=>D(Math.acos(v)),atan:v=>D(Math.atan(v)),sinh:Math.sinh,cosh:Math.cosh,tanh:Math.tanh,sec:v=>1/Math.cos(R(v)),log10:Math.log10,log2:Math.log2,ln:Math.log,exp:Math.exp,log1p:Math.log1p,abs:Math.abs,ceil:Math.ceil,floor:Math.floor,round:Math.round,sign:Math.sign,sqrt:Math.sqrt,cbrt:Math.cbrt,recip:v=>1/v,nroot:v=>{const n=parseFloat(prompt('Enter n:')||'2');return Math.pow(v,1/n);},fact:v=>{let r=1;for(let i=2;i<=Math.round(v);i++)r*=i;return r;},pct:v=>v/100,neg:v=>-v};
  const lbl={sin:'sin',cos:'cos',tan:'tan',asin:'arcsin',acos:'arccos',atan:'arctan',sinh:'sinh',cosh:'cosh',tanh:'tanh',sec:'sec',log10:'log',log2:'log₂',ln:'ln',exp:'eˣ',log1p:'ln(1+x)',abs:'|x|',ceil:'⌈x⌉',floor:'⌊x⌋',round:'round',sign:'sgn',sqrt:'√',cbrt:'∛',recip:'1/x',nroot:'ⁿ√',fact:'n!',pct:'%',neg:'±'};
  try{const r=ops[name](v);if(!isFinite(r))throw 0;const res=parseFloat(r.toPrecision(12));addHist(`${lbl[name]}(${v})`,res);$('dHist').textContent=`${lbl[name]}(${v}) =`;S.ans=res;S.disp=fmt(res);S.expr='';S.justCalc=true;render();flash();}
  catch{S.disp='Error';S.justCalc=true;render();}
}

function con(val,label){S.disp=fmt(val);S.justCalc=false;note(label);render();}
function mStore(){S.mem=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('Stored to M');}
function mRecall(){if(S.memHas){S.disp=fmt(S.mem);render();note('MR = '+fmt(S.mem));}}
function mAdd(){S.mem+=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('M+');}
function mSub(){S.mem-=parseFloat(S.disp);S.memHas=true;badge('Mem',true);note('M−');}
function mClear(){S.mem=0;S.memHas=false;badge('Mem',false);note('Memory cleared');}
function useAns(){if(S.ans!==null){S.disp=fmt(S.ans);S.justCalc=false;render();}}
function doCopy(){navigator.clipboard.writeText(S.disp).then(()=>note('Copied!'));}
function doRand(){S.disp=fmt(Math.random());S.justCalc=false;render();}

function setMode(m){S.mode=m;$('abDeg').classList.toggle('on',m==='deg');$('abRad').classList.toggle('on',m==='rad');badge('Rad',m==='rad');note(m.toUpperCase()+' mode');}

function switchTab(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));el.classList.add('on');$('p-'+id).classList.add('on');}

function addHist(expr,res){S.hist.unshift({expr,res});if(S.hist.length>20)S.hist.pop();}
function renderDrawer(){const d=$('drawer');if(!S.hist.length){d.innerHTML='<div style="color:rgba(255,255,255,0.2);font-size:11px;text-align:center;padding:10px">No history yet</div>';return;}d.innerHTML=S.hist.map((h,i)=>`<div class="h-row" onclick="pickHist(${i})"><span class="h-ex">${h.expr}</span><span class="h-val">${fmt(h.res)}</span></div>`).join('');}
function toggleDrawer(){const d=$('drawer');d.classList.toggle('open');if(d.classList.contains('open'))renderDrawer();}
function pickHist(i){S.disp=fmt(S.hist[i].res);S.justCalc=true;render();}
function clearHist(){S.hist=[];$('dHist').textContent='\u00a0';renderDrawer();note('History cleared');}

function fmt(n){if(Math.abs(n)>=1e15||(Math.abs(n)<1e-10&&n!==0))return n.toExponential(6).replace(/\.?0+e/,'e');return parseFloat(n.toPrecision(12)).toString();}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')num(e.key);
  else if(e.key==='.')dot();
  else if(e.key==='+')op('+');
  else if(e.key==='-')op('-');
  else if(e.key==='*')op('*');
  else if(e.key==='/'){ e.preventDefault();op('/'); }
  else if(e.key==='%')op('%');
  else if(e.key==='^')op('^');
  else if(e.key==='Enter'||e.key==='=')calc();
  else if(e.key==='Backspace')bs();
  else if(e.key==='Escape')ac();
  else if(e.key==='(')par('(');
  else if(e.key===')')par(')');
  else if(e.key==='s')fn('sin');
  else if(e.key==='c')fn('cos');
  else if(e.key==='t')fn('tan');
  else if(e.key==='l')fn('log10');
  else if(e.key==='n')fn('ln');
  else if(e.key==='q')fn('sqrt');
});

render();
</script>
</body>
</html>
